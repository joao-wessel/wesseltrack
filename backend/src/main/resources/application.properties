spring.application.name=backend
server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

app.name=WesselTrack
app.jwt.secret=${APP_JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.jwt.issuer=${APP_JWT_ISSUER:finance-control}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:120}
app.security.max-login-attempts=${APP_SECURITY_MAX_LOGIN_ATTEMPTS:5}
app.security.lock-duration-minutes=${APP_SECURITY_LOCK_DURATION_MINUTES:15}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:finance.db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.community.dialect.SQLiteDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.messages.encoding=UTF-8
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

logging.level.org.springframework.security=INFO
