spring.application.name=backend
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

app.name=WesselTrack
app.jwt.secret=change-this-secret-key-change-this-secret-key
app.jwt.issuer=finance-control
app.jwt.expiration-minutes=120
app.security.max-login-attempts=5
app.security.lock-duration-minutes=15
app.cors.allowed-origins=http://localhost:4200

spring.datasource.url=jdbc:sqlite:finance.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.messages.encoding=UTF-8

logging.level.org.springframework.security=INFO
