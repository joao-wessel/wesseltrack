services:
  - type: web
    name: wesseltrack-api
    runtime: java
    plan: starter
    rootDir: backend
    buildCommand: chmod +x ./mvnw && ./mvnw clean package -DskipTests
    startCommand: export SPRING_DATASOURCE_URL=$(printf '%s' "$DATABASE_URL" | sed 's#^postgresql:#jdbc:postgresql:#'); java -Dserver.port=$PORT -jar target/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: wesseltrack-web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: wesseltrack-db
          property: connectionString
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
    buildFilter:
      paths:
        - backend/**

  - type: web
    name: wesseltrack-web
    runtime: static
    rootDir: frontend
    buildCommand: sh scripts/render-build.sh
    staticPublishPath: ./dist/frontend/browser
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: wesseltrack-api
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - frontend/**

databases:
  - name: wesseltrack-db
    databaseName: wesseltrack
    plan: basic-256mb
