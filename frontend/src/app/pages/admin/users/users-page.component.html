<section class="admin-grid">
  <div class="page-header">
    <h2>Usu&aacute;rios</h2>
    <p>Apenas administradores podem cadastrar novos acessos ao WesselTrack.</p>
  </div>

  <button type="button" class="mobile-form-toggle" [class.open]="showForm()" (click)="toggleMobileForm()">
    <span class="mobile-form-toggle__copy">
      <strong>{{ showForm() ? 'Ocultar formul&aacute;rio' : 'Abrir formul&aacute;rio' }}</strong>
      <small>{{ showForm() ? 'Recolha para revisar os acessos cadastrados.' : 'Expanda para criar ou editar usu&aacute;rios.' }}</small>
    </span>
    <span class="mobile-form-toggle__icon" aria-hidden="true">{{ showForm() ? '−' : '+' }}</span>
  </button>

  <div class="split">
    @if (showForm()) {
      <form [formGroup]="form" (ngSubmit)="save()" class="panel form-grid">
        <label>
          <span>Nome</span>
          <input type="text" formControlName="name" placeholder="Nome" />
        </label>
        <label>
          <span>Usu&aacute;rio</span>
          <input type="text" formControlName="username" placeholder="Usu&aacute;rio" />
        </label>
        <label>
          <span>Senha</span>
          <input type="password" formControlName="password" placeholder="Senha" />
        </label>
        <label>
          <span>Perfil</span>
          <select formControlName="role">
            <option value="USER">Usu&aacute;rio</option>
            <option value="ADMIN">Administrador</option>
          </select>
        </label>
        <div class="actions">
          <button type="submit">{{ editingId() ? 'Salvar usu&aacute;rio' : 'Criar usu&aacute;rio' }}</button>
          @if (editingId()) { <button type="button" class="ghost" (click)="cancel()">Cancelar</button> }
        </div>
      </form>
    }

    <article class="panel list">
      @for (user of users(); track user.id) {
        <div class="row">
          <div class="user-identification">
            <strong>{{ user.name }}</strong>
            <small>{{ user.username }}</small>
          </div>
          <div class="actions inline-actions">
            <span class="pill">{{ user.role }}</span>
            <button type="button" class="ghost small" (click)="edit(user)">Editar</button>
            <button type="button" class="ghost small danger" (click)="remove(user)">Excluir</button>
          </div>
        </div>
      } @empty {
        <div class="row empty-row">
          <small>Nenhum usu&aacute;rio cadastrado.</small>
        </div>
      }
    </article>
  </div>
</section>
