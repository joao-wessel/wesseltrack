<section class="admin-grid">
  <div class="page-header">
    <h2>Usuários</h2>
    <p>Apenas administradores podem cadastrar novos acessos ao WesselTrack.</p>
  </div>

  <div class="split">
    <form [formGroup]="form" (ngSubmit)="save()" class="panel form-grid">
      <label>
        <span>Nome</span>
        <input type="text" formControlName="name" placeholder="Nome" />
      </label>
      <label>
        <span>Usuário</span>
        <input type="text" formControlName="username" placeholder="Usuário" />
      </label>
      <label>
        <span>Senha</span>
        <input type="password" formControlName="password" placeholder="Senha" />
      </label>
      <label>
        <span>Perfil</span>
        <select formControlName="role">
          <option value="USER">Usuário</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </label>
      <div class="actions">
        <button type="submit">{{ editingId() ? 'Salvar usuário' : 'Criar usuário' }}</button>
        @if (editingId()) { <button type="button" class="ghost" (click)="cancel()">Cancelar</button> }
      </div>
    </form>

    <article class="panel list">
      @for (user of users(); track user.id) {
        <div class="row">
          <div class="user-identification">
            <strong>{{ user.name }}</strong>
            <small>{{ user.username }}</small>
          </div>
          <div class="actions inline-actions">
            <span class="pill">{{ user.role }}</span>
            <button type="button" class="ghost small" (click)="edit(user)">Editar</button>
            <button type="button" class="ghost small danger" (click)="remove(user)">Excluir</button>
          </div>
        </div>
      } @empty {
        <div class="row empty-row">
          <small>Nenhum usuário cadastrado.</small>
        </div>
      }
    </article>
  </div>
</section>
