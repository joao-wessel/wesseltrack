<section class="admin-grid">
  <div class="page-header">
    <h2>Categorias</h2>
    <p>Criação e manutenção das categorias disponíveis para todos os usuários.</p>
  </div>

  <div class="split">
    <form [formGroup]="form" (ngSubmit)="save()" class="panel form-grid">
      <h3>{{ editingId() ? 'Editar categoria' : 'Nova categoria' }}</h3>
      <label>
        <span>Nome</span>
        <input type="text" formControlName="name" placeholder="Nome da categoria" />
      </label>
      <label>
        <span>Cor</span>
        <div class="color-picker-row">
          <input type="color" formControlName="color" />
          <div class="color-preview">
            <i [style.background]="form.controls.color.value"></i>
            <strong>{{ form.controls.color.value }}</strong>
          </div>
        </div>
      </label>
      <div class="actions">
        <button type="submit">Salvar</button>
        @if (editingId()) { <button type="button" class="ghost" (click)="cancel()">Cancelar</button> }
      </div>
    </form>

    <article class="panel list">
      @for (category of categories(); track category.id) {
        <div class="row">
          <span class="category-label"><i [style.background]="category.color"></i>{{ category.name }}</span>
          <div class="actions">
            <button type="button" class="ghost small" (click)="edit(category)">Editar</button>
            <button type="button" class="ghost small danger" (click)="remove(category)">Excluir</button>
          </div>
        </div>
      } @empty {
        <div class="row empty-row">
          <small>Nenhuma categoria cadastrada.</small>
        </div>
      }
    </article>
  </div>
</section>
