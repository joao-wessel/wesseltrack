<section class="shell">
  <aside class="sidebar">
    <div class="brand">
      <img src="/logo.svg" alt="WesselTrack" />
      <div>
        <strong>WesselTrack</strong>
        <small>Finance workspace</small>
      </div>
    </div>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Painel</a>
      <a routerLink="/incomes" routerLinkActive="active">Receitas</a>
      <a routerLink="/expenses" routerLinkActive="active">Despesas</a>
      <a routerLink="/goals" routerLinkActive="active">Meta mensal</a>
      @if (isAdmin()) {
        <a routerLink="/categories" routerLinkActive="active">Categorias</a>
        <a routerLink="/users" routerLinkActive="active">Usuários</a>
      }
    </nav>

    <button type="button" class="ghost" (click)="logout()">Sair</button>
  </aside>

  <main class="content">
    <header class="content-header">
      <div>
        <p class="eyebrow">{{ eyebrow() }}</p>
        <h1>Olá, {{ authService.user()?.name }}.</h1>
      </div>
      <div class="role-pill">{{ authService.user()?.role }}</div>
    </header>

    <router-outlet />
  </main>
</section>
