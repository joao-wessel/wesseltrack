<section class="shell">
  <aside class="sidebar">
    <div class="sidebar-top">
      <a class="brand" routerLink="/dashboard" (click)="closeMobileNav()">
        <img src="/logo.svg" alt="WesselTrack" />
        <div>
          <strong>WesselTrack</strong>
          <small>Finance workspace</small>
        </div>
      </a>

      <div class="sidebar-mobile-actions">
        <button
          type="button"
          class="icon-button mobile-password-button"
          (click)="openPasswordModal()"
          aria-label="Trocar senha"
          title="Trocar senha"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17 10V7a5 5 0 0 0-10 0v3H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2h-1Zm-8 0V7a3 3 0 1 1 6 0v3H9Zm3 3a2 2 0 0 1 1 3.732V18h-2v-1.268A2 2 0 0 1 12 13Z" />
          </svg>
        </button>

        <button
          type="button"
          class="icon-button mobile-menu-button"
          (click)="toggleMobileNav()"
          [attr.aria-expanded]="mobileNavOpen()"
          aria-label="Abrir menu"
          title="Menu"
        >
          @if (mobileNavOpen()) {
            <span aria-hidden="true">X</span>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16v2H4V7Zm0 8h16v2H4v-2Zm0-4h16v2H4v-2Z" />
            </svg>
          }
        </button>
      </div>
    </div>

    <div class="sidebar-menu" [class.open]="mobileNavOpen()">
      <nav>
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileNav()">Painel</a>
        <a routerLink="/incomes" routerLinkActive="active" (click)="closeMobileNav()">Receitas</a>
        <a routerLink="/expenses" routerLinkActive="active" (click)="closeMobileNav()">Despesas</a>
        <a routerLink="/goals" routerLinkActive="active" (click)="closeMobileNav()">
          <span class="nav-label-desktop">Meta e limites</span>
          <span class="nav-label-mobile">Metas</span>
        </a>
        @if (isAdmin()) {
          <a routerLink="/categories" routerLinkActive="active" (click)="closeMobileNav()">Categorias</a>
          <a routerLink="/users" routerLinkActive="active" (click)="closeMobileNav()">Usu&aacute;rios</a>
        }
      </nav>

      <button type="button" class="ghost" (click)="logout()">Sair</button>
    </div>
  </aside>

  <main class="content">
    <header class="content-header">
      <div>
        <p class="eyebrow">{{ eyebrow() }}</p>
        <h1>Ol&aacute;, {{ authService.user()?.name }}.</h1>
      </div>
      <button type="button" class="icon-button password-shortcut" (click)="openPasswordModal()" aria-label="Trocar senha" title="Trocar senha">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17 10V7a5 5 0 0 0-10 0v3H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2h-1Zm-8 0V7a3 3 0 1 1 6 0v3H9Zm3 3a2 2 0 0 1 1 3.732V18h-2v-1.268A2 2 0 0 1 12 13Z" />
        </svg>
      </button>
    </header>

    <router-outlet />
  </main>
</section>

@if (passwordModalOpen()) {
  <div class="modal-backdrop" (click)="closePasswordModal()">
    <section class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <div>
          <h2>Trocar senha</h2>
          <p>Atualize sua senha de acesso ao WesselTrack.</p>
        </div>
        <button type="button" class="icon-button subtle" (click)="closePasswordModal()" aria-label="Fechar modal">X</button>
      </div>

      <form [formGroup]="passwordForm" (ngSubmit)="submitPasswordChange()" class="modal-form">
        <label>
          <span>Senha atual</span>
          <input
            type="password"
            formControlName="currentPassword"
            autocomplete="current-password"
            placeholder="Digite sua senha atual"
          />
        </label>

        <label>
          <span>Nova senha</span>
          <input
            type="password"
            formControlName="newPassword"
            autocomplete="new-password"
            placeholder="Digite a nova senha"
          />
          @if (passwordForm.controls.newPassword.touched && passwordForm.controls.newPassword.invalid) {
            <small>A nova senha deve ter no m&iacute;nimo 8 caracteres.</small>
          }
        </label>

        <label>
          <span>Confirmar nova senha</span>
          <input
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            placeholder="Confirme a nova senha"
          />
        </label>

        <div class="modal-actions">
          <button type="button" class="ghost" (click)="closePasswordModal()">Cancelar</button>
          <button type="submit" class="primary-action">Salvar nova senha</button>
        </div>
      </form>
    </section>
  </div>
}
